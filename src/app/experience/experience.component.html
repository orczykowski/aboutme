<h2>Experience</h2>
<div class="search-bar">
  <input type="text"
         placeholder="Search by company, position, technology, responsibility..."
         [ngModel]="searchQuery()"
         (ngModelChange)="onSearch($event)"/>
  @if (searchQuery().trim()) {
    <span class="result-count">{{ totalJobs() }} found</span>
  }
</div>
<div class="timeline-container">
  <div class="timeline-track">
    @for (year of timelineYears(); track year.year) {
      <div class="year-marker" [style.left.%]="year.position">
        <span class="year-tick"></span>
        <span class="year-label">{{ year.year }}</span>
      </div>
    }
    @for (entry of timelineJobs(); track entry.id) {
      <button
        class="timeline-node"
        [class.above]="entry.above"
        [class.dimmed]="searchQuery().trim() && !isInResults(entry.job)"
        [class.active]="searchQuery().trim() && isInResults(entry.job)"
        [style.left.%]="entry.position"
        [title]="nodeTitle(entry.job)"
        (click)="scrollToJob(entry.job)"
      >
        <span class="node-dot"></span>
        <span class="node-label">{{ entry.job.companyName }}</span>
      </button>
    }
  </div>
</div>
@for (job of jobs(); track job) {
  <div [id]="toJobId(job)">
    <job [jobInfo]="job" [searchQuery]="searchQuery()"></job>
  </div>
} @empty {
  <div class="no-results">
    <p>No matching experience found.</p>
  </div>
}
